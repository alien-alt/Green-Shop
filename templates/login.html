{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — Green Shop</title>
  <meta name="description" content="Войдите в свой аккаунт Green Shop для управления заказами и персональных рекомендаций.">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <link rel="stylesheet" href="{% static 'css/responsive.css' %}">
</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <a href="index.html" class="logo">
            <svg class="logo-icon" viewBox="0 0 32 32" fill="currentColor">
              <path d="M16 2C8.5 2 4 8 4 14c0 4 2 7.5 5 9.5V28c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2v-4.5c3-2 5-5.5 5-9.5 0-6-4.5-12-12-12zm0 4c2.5 0 4.5 1.5 5.5 3.5-1.5.5-3 1.5-4 3-1.5-1-3.5-1.5-5.5-1.5-1 0-2 .1-3 .4C10.5 8 12.5 6 16 6zm-6 8c2 0 3.5.5 4.5 1.5-.5 1.5-.5 3 0 4.5-1.5.5-3 .5-4.5 0-1.5-2-1.5-4 0-6zm12 0c1.5 2 1.5 4 0 6-1.5.5-3 .5-4.5 0 .5-1.5.5-3 0-4.5 1-1 2.5-1.5 4.5-1.5z"/>
            </svg>
            Green Shop
          </a>
          <h1>Добро пожаловать!</h1>
          <p>Войдите, чтобы продолжить покупки</p>
        </div>

        <form>
          <div class="form-group">
            <label for="email" class="form-label">Email</label>
            <div class="input-wrapper">
              <input 
                type="email" 
                id="email" 
                name="email" 
                class="form-input" 
                placeholder="your@email.com"
              >
            </div>
          </div>

          <div class="form-group">
            <label for="password" class="form-label">Пароль</label>
            <div class="input-wrapper">
              <input 
                type="password" 
                id="password" 
                name="password" 
                class="form-input" 
                placeholder="Введите пароль"
              >
              <button type="button" class="password-toggle">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-full btn-lg">
            Войти
          </button>
        </form>

        <div class="auth-divider">
          <span>или</span>
        </div>

        <button type="button" class="btn btn-google btn-full btn-lg">
          <svg viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Войти через Google
        </button>

        <div class="auth-footer">
          <p>Нет аккаунта? <a href="register.html">Зарегистрируйтесь</a></p>
        </div>
      </div>
    </div>
  </div>

  <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
